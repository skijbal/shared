---
version: "2"
services:
 sonarr:
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    restart: "no"
    #Uncomment the next two lines for "local" docker networking.
    #networks:
    #  - media
    ports:
      - 8989:8989
    environment:
      - TZ=America/Chicago
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - PORT=8989
    volumes:
      - ./config:/config:rw
      - /media:/media:rw

#Uncomment the next three lines to use the network from above
#networks:
# media:
#  external: true
